// ═══ ERROR HANDLER ═══════════════════════════════════════════════════════════
function handleError(error,context=""){
const msg=error?.message||String(error);
let plain="",fix="";
if(msg.includes("401")||msg.includes("INVALID_API_KEY")){plain="Your API key is invalid or expired.";fix="Go to Settings (⚙) and re-enter your JustTCG API key.";}
else if(msg.includes("429")||msg.includes("RATE_LIMIT")){plain="Too many requests — rate limit hit.";fix="Wait 1 minute then try again. Free plan allows 10 requests/min.";}
else if(msg.includes("DAILY_LIMIT")){plain="Daily API limit reached.";fix="Resets at midnight UTC. Or upgrade plan at justtcg.com.";}
else if(msg.includes("REQUEST_LIMIT")){plain="Monthly API limit reached.";fix="Upgrade at justtcg.com/dashboard/plans.";}
else if(msg.includes("Failed to fetch")||msg.includes("NetworkError")){plain="No internet connection.";fix="Check WiFi/mobile data and try again.";}
else if(msg.includes("JSON")){plain="Received unexpected data format.";fix="Try again. If it persists, take a screenshot and report it.";}
else{plain=`Error${context?` in ${context}`:""}: ${msg.substring(0,100)}`;fix="Try again. If it persists, screenshot this and send to your Claude Project.";}
showToast(`⚠️ ${plain}\n\n💡 ${fix}`,"error",8000);
console.error(`[TCG Terminal] ${context}:`,error);
}

// ═══ API WRAPPER WITH RETRY ══════════════════════════════════════════════════
async function apiFetch(path,apiKey,opts={},retries=2){
if(!apiKey){showToast("No API key set. Go to Settings (⚙).","warn");return null;}
const url=new URL(`${API_BASE}${path}`);
if(opts.params)Object.entries(opts.params).forEach(([k,v])=>url.searchParams.append(k,v));
for(let i=0;i<=retries;i++){
try{const r=await fetch(url,{method:opts.method||"GET",headers:{"x-api-key":apiKey,"Content-Type":"application/json"},
...(opts.body?{body:JSON.stringify(opts.body)}:{})});
if(r.status===429){const wait=Math.pow(2,i)*1000;showToast(`Rate limited. Retrying in ${wait/1000}s...`,"warn");await new Promise(r=>setTimeout(r,wait));continue;}
if(r.status===401){handleError({message:"401"},"API");return null;}
if(!r.ok)throw new Error(`API ${r.status}: ${r.statusText}`);
return await r.json();}
catch(e){if(i===retries){handleError(e,"API request");return null;}
await new Promise(r=>setTimeout(r,Math.pow(2,i)*1000));}}return null;}

const[scanResult,setScanR]=useState(null);const[scanLoading,setScanL]=useState(false);

showToast("📥 Data exported! Save this backup file.","success");};

reader.onload=()=>{try{const d=JSON.parse(reader.result);if(d.portfolio)setPortfolio(d.portfolio);if(d.watchlist)setWatchlist(d.watchlist);

const search=useCallback(async()=>{if(!query.trim())return;setSearching(true);
try{if(usingMock){const q=query.toLowerCase();const pool=searchMode==="singles"?SINGLES:searchMode==="sealed"?SEALED:ALL_MOCK;
setResults(pool.filter(c=>c.name.toLowerCase().includes(q)||c.game.toLowerCase().includes(q)||c.tcgplayerId===query.trim()));}
else{const d=await apiFetch("/cards",apiKey,{params:{q:query,include_price_history:"true",priceHistoryDuration:"30d",include_statistics:"7d,30d,90d",
...(searchMode!=="all"?{}:{})}});setResults(d?.data||[]);}}
catch(e){handleError(e,"Search");}setSearching(false);},[query,apiKey,searchMode,usingMock]);

const pick=(c)=>{setCard(c);setVariant(c.variants?.[0]);setResults([]);setQuery("");setTab("card");setSubTab("chart");setAiR(null);};
const addWatch=(c)=>{if(!watchlist.find(w=>w.id===c.id)){setWatchlist(p=>[c,...p]);showToast(`${c.name} added to watchlist`,"success",1500);}};

setPortfolio(p=>[{card:addModal,variant:v,qty:parseInt(addQty)||1,entryPrice:v?.price||0,dateAdded:new Date().toISOString().split("T")[0],id:"p"+Date.now()},...p]);
setAddM(null);showToast(`${addModal.name} added to collection!`,"success",2000);};
const rmPort=(id)=>setPortfolio(p=>p.filter(e=>e.id!==id));

const handleScan=async(e)=>{const f=e.target.files?.[0];if(!f)return;setScanning(true);setScanId(null);
showToast("📷 Identifying card...","info",3000);
const reader=new FileReader();reader.onload=async()=>{const b64=reader.result.split(",")[1];const r=await scanImg(b64);
if(r){setScanId(r);setQuery(r.name);const q=r.name.toLowerCase();setResults(ALL_MOCK.filter(c=>c.name.toLowerCase().includes(q)));
showToast(`Identified: ${r.name} (${r.confidence}% match)`,"success");}else{showToast("Couldn't identify card. Try a clearer photo.","warn");}
setScanning(false);};reader.readAsDataURL(f);};

const runAI=async()=>{if(!card||!variant)return;setAiL(true);setSubTab("ai");setAiR(await callAI(mkFC(card,variant)));setAiL(false);};

showToast("Connecting to JustTCG...","info",2000);
const testKey=apiInput.trim();
try{const r=await fetch(`${API_BASE}/games`,{headers:{"x-api-key":testKey}});
if(r.ok){const d=await r.json();if(d?.data){setGames(d.data);setApiKey(testKey);showToast("✅ Connected to JustTCG API!","success");}}
else{const err=await r.json().catch(()=>({}));handleError({message:err.error||`HTTP ${r.status}`},"API Connection");}}

const losers=useMemo(()=>[...watchlist].sort((a,b)=>(a.variants?.[0]?.priceChange7d||0)-(b.variants?.[0]?.priceChange7d||0)).slice(0,5),[watchlist]);
const volat=useMemo(()=>[...watchlist].sort((a,b)=>(b.variants?.[0]?.covPrice7d||0)-(a.variants?.[0]?.covPrice7d||0)).slice(0,5),[watchlist]);

const totPL=totVal-totEntry;const totPLPct=totEntry>0?(totPL/totEntry)*100:0;
const fPort=activePortfolio.filter(e=>{if(pf==="singles")return e.card.productType!=="sealed";if(pf==="sealed")return e.card.productType==="sealed";
if(pf==="gainers")return(e.variant?.price||0)>e.entryPrice;if(pf==="losers")return(e.variant?.price||0)<e.entryPrice;return true;});
const chartData=variant?.priceHistory?.map(p=>({date:tsD(p.t),price:p.p}))||[];

return(<div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>

// ═══ APP ═════════════════════════════════════════════════════════════════════
function App(){
const[profile,setProfile]=useState(null);
useEffect(()=>{const ps=loadP();const last=localStorage.getItem(LS+"_last");if(last){const f=ps.find(p=>p.id===last);if(f)setProfile(f);}
window.addEventListener("error",(e)=>{handleError(e.error||e.message,"Unhandled");});
window.addEventListener("unhandledrejection",(e)=>{handleError(e.reason,"Promise");});},[]);
const login=(p)=>{setProfile(p);localStorage.setItem(LS+"_last",p.id);};
const logout=()=>{setProfile(null);localStorage.removeItem(LS+"_last");};
return(<><ToastContainer/>{profile?<Dashboard profile={profile} onLogout={logout}/>:<ProfileScreen onSelect={login}/>}</>);}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
